<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐蔽小说阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            border-radius: 10px;
            transition: background 0.3s, color 0.3s;
        }

        /* 标题栏 */
        .titlebar {
            height: 40px;
            background: rgba(50, 50, 50, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-radius: 10px 10px 0 0;
            -webkit-app-region: drag; /* 允许拖动窗口 */
            transition: background 0.3s;
        }

        .titlebar h1 {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            -webkit-app-region: no-drag; /* 标题不参与拖动 */
            transition: color 0.3s;
        }

        .window-controls {
            display: flex;
            gap: 10px;
            -webkit-app-region: no-drag; /* 按钮不参与拖动 */
        }

        .window-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }

        .window-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .window-btn.close:hover {
            background: #e74c3c;
        }

        /* 设置面板 */
        .settings-panel {
            padding: 15px;
            background: rgba(40, 40, 40, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out;
            max-height: 500px;
            overflow: hidden;
        }

        .settings-panel.hidden {
            max-height: 0;
            padding: 0 15px;
            border-bottom: none;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-group label {
            font-size: 12px;
            color: inherit;
            min-width: 80px;
            opacity: 0.8;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4a9eff;
            cursor: pointer;
        }

        .value-display {
            font-size: 12px;
            color: #4a9eff;
            min-width: 40px;
            text-align: right;
        }

        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .btn.active {
            background: #4a9eff;
            color: white;
        }

        input[type="text"] {
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(30, 30, 30, 0.8);
            color: inherit;
            font-size: 12px;
            width: 150px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4a9eff;
        }

        input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        /* 小说内容区 */
        .content {
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 300px);
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .chapter-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .text-content {
            font-size: 16px;
            line-height: 2;
            text-align: justify;
        }

        .text-content p {
            margin-bottom: 15px;
            text-indent: 2em;
        }

        /* 底部导航 */
        .nav {
            padding: 15px;
            background: rgba(40, 40, 40, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 10px 10px;
        }

        .nav-btn {
            padding: 8px 20px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 设置按钮 */
        .toggle-settings-btn {
            padding: 8px 15px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            flex: 1;
        }

        .toggle-settings-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        /* 快捷键说明 */
        .shortcut-info {
            font-size: 11px;
            color: inherit;
            opacity: 0.6;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            margin-left: 5px;
        }

        /* 状态提示 */
        .status-message {
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .status-message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
            display: block;
        }

        .status-message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #c0392b;
            display: block;
        }

        /* 欢迎/空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .empty-state p {
            opacity: 0.7;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <h1>📖 隐蔽小说阅读器</h1>
        <div class="window-controls">
            <button class="window-btn" onclick="minimizeWindow()">−</button>
            <button class="window-btn" onclick="maximizeWindow()">□</button>
            <button class="window-btn close" onclick="closeWindow()">×</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="control-group">
            <label>窗口透明度</label>
            <input type="range" id="opacity" min="30" max="100" value="85" oninput="changeOpacity(this.value)">
            <span class="value-display" id="opacityValue">85%</span>
        </div>
        <div class="control-group">
            <label>文字大小</label>
            <input type="range" id="fontSize" min="12" max="32" value="16" oninput="changeFontSize(this.value)">
            <span class="value-display" id="fontSizeValue">16px</span>
        </div>
        <div class="control-group">
            <label>行间距</label>
            <input type="range" id="lineHeight" min="15" max="35" value="20" oninput="changeLineHeight(this.value)">
            <span class="value-display" id="lineHeightValue">20px</span>
        </div>
        <div class="control-group">
            <label>背景颜色</label>
            <input type="color" id="bgColor" value="#1e1e1e" onchange="changeBgColor(this.value)">
        </div>
        <div class="control-group">
            <label>文字颜色</label>
            <input type="color" id="textColor" value="#e0e0e0" onchange="changeTextColor(this.value)">
        </div>
        <div class="control-group">
            <label>功能选项</label>
            <button class="btn" id="topBtn" onclick="toggleTop()">置顶</button>
            <button class="btn" onclick="openFile()">📄 打开TXT文件</button>
            <button class="btn" onclick="loadSample()">加载示例</button>
        </div>
        <div class="control-group">
            <label>隐藏快捷键</label>
            <input type="text" id="hideShortcut" value="Alt+H" placeholder="如: Alt+H">
            <button class="btn" onclick="registerShortcuts()">应用快捷键</button>
        </div>
        <div class="control-group">
            <label>显示快捷键</label>
            <input type="text" id="showShortcut" value="Alt+S" placeholder="如: Alt+S">
        </div>
        <div id="statusMessage" class="status-message"></div>
    </div>

    <div class="content" id="content">
        <div class="empty-state">
            <h2>欢迎使用隐蔽小说阅读器</h2>
            <p>点击"打开TXT文件"按钮选择小说文件，或点击"加载示例"查看示例内容。</p>
            <p>功能特点：</p>
            <p>✅ 可调节窗口透明度、背景颜色、文字颜色</p>
            <p>✅ 点击关闭按钮可以隐藏到系统托盘</p>
            <p>✅ 不在任务栏显示，仅在托盘显示</p>
            <p>✅ 支持键盘翻页</p>
            <p>✅ 可自定义快捷键</p>
            <p>使用方法：</p>
            <p>1. 点击下方"打开设置"展开设置面板</p>
            <p>2. 调整透明度、颜色、文字大小等</p>
            <p>3. 点击"打开TXT文件"选择小说</p>
            <p>4. 设置会自动收起，开始阅读</p>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn" onclick="scrollUp()">↑ 上翻页</button>
        <button class="toggle-settings-btn" onclick="toggleSettings()">⚙️ 打开设置</button>
        <button class="nav-btn" onclick="scrollDown()">下翻页 ↓</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let currentOpacity = 85;
        let isTop = false;
        let currentFontSize = 16;
        let currentLineHeight = 20;
        let settingsVisible = true;

        // 示例章节数据
        const chapters = [
            {
                title: "第一章 初遇",
                content: `这是一个示例小说的第一章。

春天的午后，阳光透过窗户洒在书桌上，空气中弥漫着淡淡的花香。

李明刚刚结束了上午的工作，正准备去楼下的小店买杯咖啡。推开办公室的门，一阵微风拂面而来，带着春天的气息。

电梯缓缓下降，叮的一声，门打开了。他正要走出去，却看见一个女孩从电梯外走了进来。女孩长发如瀑，眼神清澈如水，穿着简单的白色连衣裙，却美得让人移不开视线。

"不好意思。"女孩轻声说道，声音如银铃般清脆。

李明愣了一下，才意识到自己挡住了路，连忙退到一旁。"没关系。"

两人擦肩而过，李明闻到了女孩身上淡淡的茉莉花香。那一刻，他的心跳不知为何快了几分。`
            },
            {
                title: "第二章 相识",
                content: `李明回到办公室，心情久久不能平静。

那个女孩的身影在他脑海中挥之不去。他想，也许这就是传说中的心动吧。

下午，公司来了一位新同事。当经理带着新人走进会议室时，李明惊讶地瞪大了眼睛——竟然是电梯里遇到的那个女孩！

"大家认识一下，这是新来的设计师，叫林雨晴。"经理介绍道。

林雨晴微笑着向大家点头，目光在扫过李明时，停留了片刻，似乎也认出了他。

散会时，李明鼓起勇气走上前去。"你好，我叫李明，是前端开发组的。"

"你好，我是林雨晴。"女孩的微笑如春风般温暖。`
            },
            {
                title: "第三章 相知",
                content: `从那天起，李明和林雨晴的交集多了起来。

因为工作的关系，他们经常需要一起讨论项目。渐渐地，李明发现林雨晴不仅长得漂亮，而且才华横溢，工作认真负责。

而林雨晴也发现，李明虽然平时话不多，但做事踏实，技术精湛，是一个值得信赖的伙伴。

一个雨夜，两人加班到很晚。窗外雷声隆隆，雨点敲打着玻璃。

"这么晚了，我送你回家吧。"李明鼓起勇气说道。

林雨晴犹豫了一下，点了点头。"谢谢。"

撑着伞走在雨中，两人的距离似乎近了很多。`
            }
        ];

        // 切换透明度
        function changeOpacity(value) {
            currentOpacity = value;
            document.getElementById('opacityValue').textContent = value + '%';
            updateOpacity();
        }

        function updateOpacity() {
            const bgColor = hexToRgb(document.getElementById('bgColor').value);
            document.body.style.background = `rgba(${bgColor.r}, ${bgColor.g}, ${bgColor.b}, ${currentOpacity / 100})`;
        }

        // 切换文字大小
        function changeFontSize(value) {
            currentFontSize = value;
            document.getElementById('fontSizeValue').textContent = value + 'px';
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.fontSize = value + 'px';
            }
        }

        // 切换行间距
        function changeLineHeight(value) {
            currentLineHeight = value;
            document.getElementById('lineHeightValue').textContent = value + 'px';
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.lineHeight = (value / 10);
            }
        }

        // 切换背景颜色
        function changeBgColor(value) {
            updateOpacity();
        }

        // 切换文字颜色
        function changeTextColor(value) {
            document.body.style.color = value;
            const titlebar = document.querySelector('.titlebar h1');
            if (titlebar) titlebar.style.color = value;

            const labels = document.querySelectorAll('label');
            labels.forEach(label => {
                label.style.color = value;
                label.style.opacity = '0.8';
            });

            const shortcutInfo = document.querySelector('.shortcut-info');
            if (shortcutInfo) shortcutInfo.style.color = value;

            const textContent = document.getElementById('textContent');
            if (textContent) textContent.style.color = value;
        }

        // 切换置顶
        function toggleTop() {
            isTop = !isTop;
            const btn = document.getElementById('topBtn');
            if (isTop) {
                btn.classList.add('active');
                btn.textContent = '取消置顶';
                ipcRenderer.send('set-always-on-top', true);
            } else {
                btn.classList.remove('active');
                btn.textContent = '置顶';
                ipcRenderer.send('set-always-on-top', false);
            }
        }

        // 切换设置面板显示/隐藏
        function toggleSettings() {
            settingsVisible = !settingsVisible;
            const panel = document.getElementById('settingsPanel');
            const btn = document.querySelector('.toggle-settings-btn');

            if (settingsVisible) {
                panel.classList.remove('hidden');
                btn.textContent = '⚙️ 关闭设置';
            } else {
                panel.classList.add('hidden');
                btn.textContent = '⚙️ 打开设置';
            }
        }

        // 最小化窗口
        function minimizeWindow() {
            ipcRenderer.send('minimize-window');
        }

        // 最大化/还原窗口
        function maximizeWindow() {
            ipcRenderer.send('maximize-window');
        }

        // 关闭窗口
        function closeWindow() {
            ipcRenderer.send('close-window');
        }

        // 上翻页
        function scrollUp() {
            const content = document.getElementById('content');
            content.scrollBy({
                top: -300,
                behavior: 'smooth'
            });
        }

        // 下翻页
        function scrollDown() {
            const content = document.getElementById('content');
            content.scrollBy({
                top: 300,
                behavior: 'smooth'
            });
        }

        // 加载示例
        function loadSample() {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="chapter-title">${chapters[0].title}</div>
                <div class="text-content" id="textContent">
                    ${chapters[0].content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
                </div>
            `;
            applyStyles();
            showStatus('示例已加载', 'success');

            // 自动收起设置
            if (settingsVisible) {
                toggleSettings();
            }
        }

        // 打开文件
        function openFile() {
            ipcRenderer.send('open-file-dialog');
        }

        // 接收文件内容
        ipcRenderer.on('file-loaded', (event, { content, fileName }) => {
            // 将文件内容按段落分割
            const paragraphs = content.split(/\n\s*\n/).filter(p => p.trim());

            if (paragraphs.length === 0) {
                showStatus('文件内容为空', 'error');
                return;
            }

            // 生成HTML
            const html = paragraphs.map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');

            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="chapter-title">${fileName}</div>
                <div class="text-content" id="textContent">
                    ${html}
                </div>
            `;

            // 滚动到顶部
            document.getElementById('content').scrollTop = 0;

            // 应用样式
            applyStyles();

            showStatus(`已加载: ${fileName}`, 'success');

            // 自动收起设置
            if (settingsVisible) {
                toggleSettings();
            }
        });

        // 接收文件错误
        ipcRenderer.on('file-error', (event, { error }) => {
            showStatus(`加载失败: ${error}`, 'error');
        });

        // 应用当前样式
        function applyStyles() {
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.fontSize = currentFontSize + 'px';
                textContent.style.lineHeight = (currentLineHeight / 10);
                textContent.style.color = document.getElementById('textColor').value;
            }
        }

        // 注册快捷键
        function registerShortcuts() {
            const hideKey = document.getElementById('hideShortcut').value.trim();
            const showKey = document.getElementById('showShortcut').value.trim();

            if (!hideKey || !showKey) {
                showStatus('请填写快捷键', 'error');
                return;
            }

            ipcRenderer.send('register-shortcut', { hideKey, showKey });
        }

        // 接收快捷键注册结果
        ipcRenderer.on('shortcut-registered', (event, { success, error }) => {
            if (success) {
                showStatus('快捷键已设置成功！', 'success');
            } else {
                showStatus(`快捷键设置失败: ${error}`, 'error');
            }
        });

        // 显示状态消息
        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = `status-message ${type}`;

            setTimeout(() => {
                status.className = 'status-message';
                status.textContent = '';
            }, 3000);
        }

        // 辅助函数：Hex 转 RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 30, g: 30, b: 30 };
        }

        // 键盘快捷键监听
        document.addEventListener('keydown', (e) => {
            const content = document.getElementById('content');
            if (!content) return;

            const isAtTop = content.scrollTop === 0;
            const isAtBottom = content.scrollHeight - content.scrollTop === content.clientHeight;

            switch (e.key) {
                case 'ArrowUp':
                    if (isAtTop) {
                        e.preventDefault();
                        scrollUp();
                    }
                    break;
                case 'ArrowDown':
                    if (isAtBottom) {
                        e.preventDefault();
                        scrollDown();
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    scrollUp();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    scrollDown();
                    break;
                case 'PageUp':
                    e.preventDefault();
                    scrollUp();
                    break;
                case 'PageDown':
                    e.preventDefault();
                    scrollDown();
                    break;
                case ' ':
                    e.preventDefault();
                    scrollDown();
                    break;
            }
        });

        // 初始化
        window.onload = function() {
            updateOpacity();
            registerShortcuts();

            // 默认收起设置
            toggleSettings();
        };
    </script>
</body>
</html>
