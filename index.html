<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐蔽小说阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            border-radius: 10px;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* 标题栏 */
        .titlebar {
            height: 40px;
            background: rgba(50, 50, 50, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-radius: 10px 10px 0 0;
            -webkit-app-region: drag;
            transition: background 0.3s;
        }

        .titlebar h1 {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            -webkit-app-region: no-drag;
            transition: color 0.3s;
        }

        .window-controls {
            display: flex;
            gap: 10px;
            -webkit-app-region: no-drag;
        }

        .window-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }

        .window-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .window-btn.close:hover {
            background: #e74c3c;
        }

        /* 设置面板 */
        .settings-panel {
            padding: 15px;
            background: rgba(40, 40, 40, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out;
            max-height: 500px;
            overflow: hidden;
        }

        .settings-panel.hidden {
            max-height: 0;
            padding: 0 15px;
            border-bottom: none;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-group label {
            font-size: 12px;
            color: inherit;
            min-width: 80px;
            opacity: 0.8;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4a9eff;
            cursor: pointer;
        }

        .value-display {
            font-size: 12px;
            color: #4a9eff;
            min-width: 40px;
            text-align: right;
        }

        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .btn.active {
            background: #4a9eff;
            color: white;
        }

        input[type="text"] {
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(30, 30, 30, 0.8);
            color: inherit;
            font-size: 12px;
            width: 150px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4a9eff;
        }

        input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        /* 小说内容区 */
        .content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .chapter-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .text-content {
            font-size: 16px;
            line-height: 2;
            text-align: justify;
        }

        .text-content p {
            margin-bottom: 15px;
            text-indent: 2em;
        }

        /* 搜索结果 */
        .search-results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .book-item {
            padding: 15px;
            background: rgba(60, 60, 60, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .book-item:hover {
            background: rgba(80, 80, 80, 0.8);
        }

        .book-item h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #4a9eff;
        }

        .book-item .book-info {
            font-size: 12px;
            opacity: 0.7;
            line-height: 1.6;
        }

        /* 章节列表 */
        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chapter-item {
            padding: 10px 15px;
            background: rgba(60, 60, 60, 0.5);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
        }

        .chapter-item:hover {
            background: rgba(80, 80, 80, 0.7);
        }

        .chapter-item.active {
            background: rgba(74, 158, 255, 0.3);
            color: #4a9eff;
        }

        /* 底部导航 */
        .nav {
            padding: 15px;
            background: rgba(40, 40, 40, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 10px 10px;
            gap: 10px;
        }

        .nav-btn {
            padding: 8px 20px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        /* 设置按钮 */
        .toggle-settings-btn {
            padding: 8px 15px;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            flex: 1;
        }

        .toggle-settings-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        /* 快捷键说明 */
        .shortcut-info {
            font-size: 11px;
            color: inherit;
            opacity: 0.6;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            margin-left: 5px;
        }

        /* 状态提示 */
        .status-message {
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .status-message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
            display: block;
        }

        .status-message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #c0392b;
            display: block;
        }

        /* 欢迎/空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .empty-state p {
            opacity: 0.7;
            line-height: 1.8;
        }

        /* 书源选择器 */
        .source-selector {
            margin-bottom: 10px;
        }

        .source-select {
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(30, 30, 30, 0.8);
            color: inherit;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-box input {
            flex: 1;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <h1>📖 隐蔽小说阅读器</h1>
        <div class="window-controls">
            <button class="window-btn" onclick="minimizeWindow()">−</button>
            <button class="window-btn" onclick="maximizeWindow()">□</button>
            <button class="window-btn close" onclick="closeWindow()">×</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="control-group">
            <label>窗口透明度</label>
            <input type="range" id="opacity" min="30" max="100" value="85" oninput="changeOpacity(this.value)">
            <span class="value-display" id="opacityValue">85%</span>
        </div>
        <div class="control-group">
            <label>文字大小</label>
            <input type="range" id="fontSize" min="12" max="32" value="16" oninput="changeFontSize(this.value)">
            <span class="value-display" id="fontSizeValue">16px</span>
        </div>
        <div class="control-group">
            <label>行间距</label>
            <input type="range" id="lineHeight" min="15" max="35" value="20" oninput="changeLineHeight(this.value)">
            <span class="value-display" id="lineHeightValue">20px</span>
        </div>
        <div class="control-group">
            <label>背景颜色</label>
            <input type="color" id="bgColor" value="#1e1e1e" onchange="changeBgColor(this.value)">
        </div>
        <div class="control-group">
            <label>文字颜色</label>
            <input type="color" id="textColor" value="#e0e0e0" onchange="changeTextColor(this.value)">
        </div>
        <div class="control-group">
            <label>功能选项</label>
            <button class="btn" id="topBtn" onclick="toggleTop()">置顶</button>
            <button class="btn" onclick="openFile()">📄 打开TXT文件</button>
            <button class="btn" onclick="importSource()">📥 导入书源</button>
            <button class="btn" onclick="loadSample()">加载示例</button>
        </div>
        <div class="control-group">
            <label>隐藏快捷键</label>
            <input type="text" id="hideShortcut" value="Alt+H" placeholder="如: Alt+H">
            <button class="btn" onclick="registerShortcuts()">应用快捷键</button>
        </div>
        <div class="control-group">
            <label>显示快捷键</label>
            <input type="text" id="showShortcut" value="Alt+S" placeholder="如: Alt+S">
        </div>
        <div id="statusMessage" class="status-message"></div>
    </div>

    <div class="content" id="content">
        <div class="empty-state">
            <h2>欢迎使用隐蔽小说阅读器</h2>
            <p>功能特点：</p>
            <p>✅ 支持在线搜索小说（需导入书源）</p>
            <p>✅ 支持换源阅读</p>
            <p>✅ 支持缓存小说为TXT</p>
            <p>✅ 可调节窗口透明度、背景颜色、文字颜色</p>
            <p>✅ 点击关闭按钮可以隐藏到系统托盘</p>
            <p>✅ 不在任务栏显示，仅在托盘显示</p>
            <p>✅ 支持键盘翻页</p>
            <p>✅ 可自定义快捷键</p>
            <p>使用方法：</p>
            <p>1. 先导入书源文件（支持番阁格式）</p>
            <p>2. 输入小说名称搜索</p>
            <p>3. 点击小说查看章节列表</p>
            <p>4. 点击章节开始阅读</p>
            <p>5. 可随时换源或缓存为TXT</p>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn nav-btn-small" id="searchBtn" onclick="showSearch()">🔍 搜索</button>
        <button class="nav-btn nav-btn-small" id="chaptersBtn" onclick="showChapters()" disabled>📑 目录</button>
        <button class="nav-btn nav-btn-small" id="prevBtn" onclick="prevChapter()" disabled>◀ 上一章</button>
        <button class="nav-btn nav-btn-small" id="nextBtn" onclick="nextChapter()" disabled>下一章 ▶</button>
        <button class="nav-btn nav-btn-small" id="cacheBtn" onclick="cacheToTxt()" disabled>💾 缓存TXT</button>
        <button class="nav-btn nav-btn-small" id="changeSourceBtn" onclick="changeSource()" disabled>🔄 换源</button>
        <button class="toggle-settings-btn" onclick="toggleSettings()">⚙️ 打开设置</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let currentOpacity = 85;
        let isTop = false;
        let currentFontSize = 16;
        let currentLineHeight = 20;
        let settingsVisible = true;
        
        // 书源和小说数据
        let bookSources = [];
        let currentSource = null;
        let searchResults = [];
        let currentBook = null;
        let currentChapterIndex = -1;
        let chapters = [];

        // 示例章节数据
        const sampleChapters = [
            {
                title: "第一章 初遇",
                content: `这是一个示例小说的第一章。

春天的午后，阳光透过窗户洒在书桌上，空气中弥漫着淡淡的花香。

李明刚刚结束了上午的工作，正准备去楼下的小店买杯咖啡。推开办公室的门，一阵微风拂面而来，带着春天的气息。

电梯缓缓下降，叮的一声，门打开了。他正要走出去，却看见一个女孩从电梯外走了进来。女孩长发如瀑，眼神清澈如水，穿着简单的白色连衣裙，却美得让人移不开视线。

"不好意思。"女孩轻声说道，声音如银铃般清脆。

李明愣了一下，才意识到自己挡住了路，连忙退到一旁。"没关系。"

两人擦肩而过，李明闻到了女孩身上淡淡的茉莉花香。那一刻，他的心跳不知为何快了几分。`
            },
            {
                title: "第二章 相识",
                content: `李明回到办公室，心情久久不能平静。

那个女孩的身影在他脑海中挥之不去。他想，也许这就是传说中的心动吧。

下午，公司来了一位新同事。当经理带着新人走进会议室时，李明惊讶地瞪大了眼睛——竟然是电梯里遇到的那个女孩！

"大家认识一下，这是新来的设计师，叫林雨晴。"经理介绍道。

林雨晴微笑着向大家点头，目光在扫过李明时，停留了片刻，似乎也认出了他。

散会时，李明鼓起勇气走上前去。"你好，我叫李明，是前端开发组的。"

"你好，我是林雨晴。"女孩的微笑如春风般温暖。`
            },
            {
                title: "第三章 相知",
                content: `从那天起，李明和林雨晴的交集多了起来。

因为工作的关系，他们经常需要一起讨论项目。渐渐地，李明发现林雨晴不仅长得漂亮，而且才华横溢，工作认真负责。

而林雨晴也发现，李明虽然平时话不多，但做事踏实，技术精湛，是一个值得信赖的伙伴。

一个雨夜，两人加班到很晚。窗外雷声隆隆，雨点敲打着玻璃。

"这么晚了，我送你回家吧。"李明鼓起勇气说道。

林雨晴犹豫了一下，点了点头。"谢谢。"

撑着伞走在雨中，两人的距离似乎近了很多。`
            }
        ];

        // 切换透明度
        function changeOpacity(value) {
            currentOpacity = value;
            document.getElementById('opacityValue').textContent = value + '%';
            updateOpacity();
        }

        function updateOpacity() {
            const bgColor = hexToRgb(document.getElementById('bgColor').value);
            document.body.style.background = `rgba(${bgColor.r}, ${bgColor.g}, ${bgColor.b}, ${currentOpacity / 100})`;
        }

        // 切换文字大小
        function changeFontSize(value) {
            currentFontSize = value;
            document.getElementById('fontSizeValue').textContent = value + 'px';
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.fontSize = value + 'px';
            }
        }

        // 切换行间距
        function changeLineHeight(value) {
            currentLineHeight = value;
            document.getElementById('lineHeightValue').textContent = value + 'px';
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.lineHeight = (value / 10);
            }
        }

        // 切换背景颜色
        function changeBgColor(value) {
            updateOpacity();
        }

        // 切换文字颜色
        function changeTextColor(value) {
            document.body.style.color = value;
            const titlebar = document.querySelector('.titlebar h1');
            if (titlebar) titlebar.style.color = value;

            const labels = document.querySelectorAll('label');
            labels.forEach(label => {
                label.style.color = value;
                label.style.opacity = '0.8';
            });

            const shortcutInfo = document.querySelector('.shortcut-info');
            if (shortcutInfo) shortcutInfo.style.color = value;

            const textContent = document.getElementById('textContent');
            if (textContent) textContent.style.color = value;
        }

        // 切换置顶
        function toggleTop() {
            isTop = !isTop;
            const btn = document.getElementById('topBtn');
            if (isTop) {
                btn.classList.add('active');
                btn.textContent = '取消置顶';
                ipcRenderer.send('set-always-on-top', true);
            } else {
                btn.classList.remove('active');
                btn.textContent = '置顶';
                ipcRenderer.send('set-always-on-top', false);
            }
        }

        // 切换设置面板显示/隐藏
        function toggleSettings() {
            settingsVisible = !settingsVisible;
            const panel = document.getElementById('settingsPanel');
            const btn = document.querySelector('.toggle-settings-btn');

            if (settingsVisible) {
                panel.classList.remove('hidden');
                btn.textContent = '⚙️ 关闭设置';
            } else {
                panel.classList.add('hidden');
                btn.textContent = '⚙️ 打开设置';
            }
        }

        // 导入书源
        function importSource() {
            console.log('导入书源按钮被点击');
            showStatus('正在打开文件选择...', 'success');
            try {
                ipcRenderer.send('import-book-source');
                console.log('IPC 消息已发送');
            } catch (error) {
                console.error('发送 IPC 消息失败:', error);
                showStatus('导入失败: ' + error.message, 'error');
            }
        }

        // 接收导入的书源
        ipcRenderer.on('book-source-imported', (event, { sources, error }) => {
            if (error) {
                showStatus(`导入失败: ${error}`, 'error');
                return;
            }
            
            bookSources = sources;
            showStatus(`成功导入 ${sources.length} 个书源`, 'success');
            
            if (sources.length > 0) {
                currentSource = sources[0];
            }
        });

        // 显示搜索界面
        function showSearch() {
            if (bookSources.length === 0) {
                showStatus('请先导入书源', 'error');
                return;
            }

            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="输入小说名称(支持模糊搜索,如:斗罗)" 
                           onkeypress="if(event.key==='Enter') performSearch()">
                    <button class="btn" onclick="performSearch()">🔍 搜索所有源</button>
                </div>
                <div id="searchInfo" style="margin: 10px 0; opacity: 0.7; font-size: 12px;">
                    已导入 ${bookSources.length} 个书源,点击搜索将搜索所有书源
                </div>
                <div id="searchErrors" style="margin: 10px 0;"></div>
                <div id="searchResults" class="search-results"></div>
            `;

            // 自动收起设置
            if (settingsVisible) {
                toggleSettings();
            }

            document.getElementById('searchInput').focus();
        }



        // 执行搜索
        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showStatus('请输入小说名称', 'error');
                return;
            }

            showStatus('搜索中...', 'success');
            document.getElementById('searchResults').innerHTML = '<div class="loading">正在搜索所有书源</div>';
            document.getElementById('searchErrors').innerHTML = '';

            ipcRenderer.send('search-books', {
                keyword: keyword
            });
        }

        // 接收搜索结果
        ipcRenderer.on('search-results', (event, { results, errors }) => {
            // 显示错误信息
            if (errors && errors.length > 0) {
                const errorsDiv = document.getElementById('searchErrors');
                errorsDiv.innerHTML = `
                    <div style="background: rgba(231, 76, 60, 0.1); padding: 10px; border-radius: 4px; margin-bottom: 10px;">
                        <p style="color: #e74c3c; margin: 0; font-size: 12px;">以下书源搜索失败:</p>
                        ${errors.map(e => `<p style="color: #e74c3c; margin: 5px 0 0 0; font-size: 11px;">• ${e}</p>`).join('')}
                    </div>
                `;
            }

            if (!results || results.length === 0) {
                document.getElementById('searchResults').innerHTML = '<p style="opacity: 0.7;">未找到相关小说</p>';
                showStatus('未找到相关小说', 'error');
                return;
            }

            searchResults = results;
            displaySearchResults(results);
            showStatus(`找到 ${results.length} 本小说`, 'success');
        });

        // 显示搜索结果
        function displaySearchResults(results) {
            const resultsDiv = document.getElementById('searchResults');

            if (!results || results.length === 0) {
                resultsDiv.innerHTML = '<p style="opacity: 0.7;">未找到相关小说</p>';
                return;
            }

            resultsDiv.innerHTML = results.map((book, index) => `
                <div class="book-item" onclick="selectBook(${index})">
                    <h3>${book.name}</h3>
                    <div class="book-info">
                        <p>作者：${book.author || '未知'}</p>
                        <p>来源：<span style="color: #4a9eff;">${book.sourceName || '未知源'}</span></p>
                        <p>${book.intro || '暂无简介'}</p>
                        ${book.kind ? `<p>标签：${book.kind}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 选择小说
        function selectBook(index) {
            currentBook = searchResults[index];
            currentSource = bookSources[currentBook.sourceIndex];
            showStatus(`正在从 ${currentSource.bookSourceName} 获取章节...`, 'success');

            ipcRenderer.send('get-chapters', {
                source: currentSource,
                book: currentBook
            });
        }

        // 接收章节列表
        ipcRenderer.on('chapters-loaded', (event, { chapters: chapterData, error }) => {
            if (error) {
                showStatus(`获取章节失败: ${error}`, 'error');
                return;
            }

            chapters = chapterData;
            showChapters();
            showStatus(`共 ${chapters.length} 章`, 'success');
        });

        // 显示章节列表
        function showChapters() {
            if (chapters.length === 0) {
                showStatus('暂无章节', 'error');
                return;
            }

            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="chapter-title">${currentBook.name} - 章节目录</div>
                <div class="chapter-list">
                    ${chapters.map((chapter, index) => `
                        <div class="chapter-item ${index === currentChapterIndex ? 'active' : ''}" 
                             onclick="loadChapter(${index})">
                            ${chapter.title}
                        </div>
                    `).join('')}
                </div>
            `;

            enableNavigationButtons();
            
            // 自动收起设置
            if (settingsVisible) {
                toggleSettings();
            }
        }

        // 加载章节
        function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;

            currentChapterIndex = index;
            const chapter = chapters[index];

            showStatus('加载中...', 'success');

            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loading">加载中</div>';

            ipcRenderer.send('get-chapter-content', {
                source: currentSource,
                book: currentBook,
                chapter: chapter
            });

            // 如果在章节列表页面，重新显示并高亮当前章节
            if (document.querySelector('.chapter-list')) {
                showChapters();
            }

            enableNavigationButtons();
        }

        // 接收章节内容
        ipcRenderer.on('chapter-content-loaded', (event, { content, error }) => {
            if (error) {
                showStatus(`加载失败: ${error}`, 'error');
                document.getElementById('content').innerHTML = `<p style="color: #e74c3c;">${error}</p>`;
                return;
            }

            displayChapterContent(content);
            showStatus(`已加载: ${chapters[currentChapterIndex].title}`, 'success');
        });

        // 显示章节内容
        function displayChapterContent(content) {
            const contentDiv = document.getElementById('content');
            
            // 将内容按段落分割
            const paragraphs = content.split(/\n\s*\n/).filter(p => p.trim());
            const html = paragraphs.map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');

            contentDiv.innerHTML = `
                <div class="chapter-title">${chapters[currentChapterIndex].title}</div>
                <div class="text-content" id="textContent">
                    ${html}
                </div>
            `;

            // 滚动到顶部
            contentDiv.scrollTop = 0;

            // 应用样式
            applyStyles();
        }

        // 上一章
        function prevChapter() {
            if (currentChapterIndex > 0) {
                loadChapter(currentChapterIndex - 1);
            }
        }

        // 下一章
        function nextChapter() {
            if (currentChapterIndex < chapters.length - 1) {
                loadChapter(currentChapterIndex + 1);
            }
        }

        // 启用导航按钮
        function enableNavigationButtons() {
            document.getElementById('chaptersBtn').disabled = false;
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('cacheBtn').disabled = false;
            document.getElementById('changeSourceBtn').disabled = bookSources.length > 1;
        }

        // 缓存为TXT
        function cacheToTxt() {
            if (!currentBook || chapters.length === 0) {
                showStatus('没有可缓存的小说', 'error');
                return;
            }

            showStatus('缓存中...', 'success');
            ipcRenderer.send('cache-book-to-txt', {
                book: currentBook,
                chapters: chapters
            });
        }

        // 接收缓存结果
        ipcRenderer.on('cache-completed', (event, { success, error, filePath }) => {
            if (success) {
                showStatus(`缓存成功: ${filePath}`, 'success');
            } else {
                showStatus(`缓存失败: ${error}`, 'error');
            }
        });

        // 换源 - 在所有书源中搜索同一本书
        function changeSource() {
            if (!currentBook) {
                showStatus('请先选择小说', 'error');
                return;
            }

            showStatus('正在换源搜索...', 'success');

            // 重新搜索当前书名
            ipcRenderer.send('search-books', {
                keyword: currentBook.name
            });
        }

        // 最小化窗口
        function minimizeWindow() {
            ipcRenderer.send('minimize-window');
        }

        // 最大化/还原窗口
        function maximizeWindow() {
            ipcRenderer.send('maximize-window');
        }

        // 关闭窗口
        function closeWindow() {
            ipcRenderer.send('close-window');
        }

        // 上翻页
        function scrollUp() {
            const content = document.getElementById('content');
            content.scrollBy({
                top: -300,
                behavior: 'smooth'
            });
        }

        // 下翻页
        function scrollDown() {
            const content = document.getElementById('content');
            content.scrollBy({
                top: 300,
                behavior: 'smooth'
            });
        }

        // 加载示例
        function loadSample() {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="chapter-title">${sampleChapters[0].title}</div>
                <div class="text-content" id="textContent">
                    ${sampleChapters[0].content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
                </div>
            `;
            applyStyles();
            showStatus('示例已加载', 'success');

            // 自动收起设置
            if (settingsVisible) {
                toggleSettings();
            }
        }

        // 打开文件
        function openFile() {
            ipcRenderer.send('open-file-dialog');
        }

        // 接收文件内容
        ipcRenderer.on('file-loaded', (event, { content, fileName }) => {
            const paragraphs = content.split(/\n\s*\n/).filter(p => p.trim());

            if (paragraphs.length === 0) {
                showStatus('文件内容为空', 'error');
                return;
            }

            const html = paragraphs.map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');

            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="chapter-title">${fileName}</div>
                <div class="text-content" id="textContent">
                    ${html}
                </div>
            `;

            document.getElementById('content').scrollTop = 0;
            applyStyles();

            showStatus(`已加载: ${fileName}`, 'success');

            if (settingsVisible) {
                toggleSettings();
            }
        });

        // 接收文件错误
        ipcRenderer.on('file-error', (event, { error }) => {
            showStatus(`加载失败: ${error}`, 'error');
        });

        // 应用当前样式
        function applyStyles() {
            const textContent = document.getElementById('textContent');
            if (textContent) {
                textContent.style.fontSize = currentFontSize + 'px';
                textContent.style.lineHeight = (currentLineHeight / 10);
                textContent.style.color = document.getElementById('textColor').value;
            }
        }

        // 注册快捷键
        function registerShortcuts() {
            const hideKey = document.getElementById('hideShortcut').value.trim();
            const showKey = document.getElementById('showShortcut').value.trim();

            if (!hideKey || !showKey) {
                showStatus('请填写快捷键', 'error');
                return;
            }

            ipcRenderer.send('register-shortcut', { hideKey, showKey });
        }

        // 接收快捷键注册结果
        ipcRenderer.on('shortcut-registered', (event, { success, error }) => {
            if (success) {
                showStatus('快捷键已设置成功！', 'success');
            } else {
                showStatus(`快捷键设置失败: ${error}`, 'error');
            }
        });

        // 显示状态消息
        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = `status-message ${type}`;

            setTimeout(() => {
                status.className = 'status-message';
                status.textContent = '';
            }, 3000);
        }

        // 辅助函数：Hex 转 RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 30, g: 30, b: 30 };
        }

        // 键盘快捷键监听
        document.addEventListener('keydown', (e) => {
            const content = document.getElementById('content');
            if (!content) return;

            const isAtTop = content.scrollTop === 0;
            const isAtBottom = content.scrollHeight - content.scrollTop === content.clientHeight;

            switch (e.key) {
                case 'ArrowUp':
                    if (isAtTop) {
                        e.preventDefault();
                        scrollUp();
                    }
                    break;
                case 'ArrowDown':
                    if (isAtBottom) {
                        e.preventDefault();
                        scrollDown();
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    scrollUp();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    scrollDown();
                    break;
                case 'PageUp':
                    e.preventDefault();
                    scrollUp();
                    break;
                case 'PageDown':
                    e.preventDefault();
                    scrollDown();
                    break;
                case ' ':
                    e.preventDefault();
                    scrollDown();
                    break;
            }
        });

        // 初始化
        window.onload = function() {
            updateOpacity();
            registerShortcuts();
            toggleSettings();
        };
    </script>
</body>
</html>
